<!DOCTYPE html>
<html>

<head>

<title>AI Knowledge Chatbot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

/* animated gradient background */

background:linear-gradient(-45deg,#4f46e5,#7c3aed,#6366f1,#4338ca);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
}

/* gradient animation */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* floating particles */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
top:-50%;
left:-50%;
background-image:
radial-gradient(circle,#ffffff22 2px,transparent 2px);
background-size:60px 60px;
animation:particlesMove 30s linear infinite;
}

/* chatbot container */

.chat-container{
width:650px;
height:600px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.85);
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
display:flex;
flex-direction:column;
overflow:hidden;
position:relative;
}

/* header */

.header{
background:linear-gradient(120deg,#bec77c,#89beed,#806e9f);
background-size:200% 200%;
animation:headerFlow 6s ease infinite;
color:white;
padding:18px;
font-size:19px;
font-weight:600;
text-align:center;
letter-spacing:0.5px;
}

@keyframes headerFlow{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* chat area */

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

/* custom scrollbar */

.chat-box::-webkit-scrollbar{
width:6px;
}

.chat-box::-webkit-scrollbar-thumb{
background:#b9b9b9;
border-radius:10px;
}

/* messages */

.message{
display:flex;
animation:fadeIn 0.35s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

/* bubbles */

.bubble{
padding:12px 16px;
border-radius:18px;
max-width:70%;
font-size:14px;
line-height:1.5;
word-wrap:break-word;
transition:transform 0.2s ease, box-shadow 0.2s ease;
}

.bubble:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.user .bubble{
background:#4f46e5;
color:white;
}

.bot .bubble{
background:#e5e7eb;
}

/* copy button */

.copy-btn{
font-size:11px;
margin-top:6px;
cursor:pointer;
color:#555;
opacity:0.6;
transition:opacity 0.2s;
}

.copy-btn:hover{
opacity:1;
}

/* typing animation */

.typing{
display:flex;
gap:6px;
}

.typing span{
width:7px;
height:7px;
background:#777;
border-radius:50%;
animation:typing 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:0.2s;
}

.typing span:nth-child(3){
animation-delay:0.4s;
}

@keyframes typing{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* input area */

.input-area{
display:flex;
padding:12px;
border-top:1px solid #ddd;
background:white;
}

input{
flex:1;
padding:11px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
outline:none;
transition:border 0.2s;
}

input:focus{
border-color:#6366f1;
}

/* send button */

button{
margin-left:10px;
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(120deg,#4f46e5,#6366f1);
color:white;
font-weight:600;
cursor:pointer;
transition:all 0.25s ease;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(79,70,229,0.5);
}

button:active{
transform:scale(0.95);
}
</style>

</head>

<body>

<div class="chat-container">

<div class="header">
🤖 AI Knowledge Chatbot
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
<input id="messageInput" placeholder="Ask something..." onkeypress="handleKey(event)">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const chatBox=document.getElementById("chatBox");

function handleKey(e){
if(e.key==="Enter"){
sendMessage();
}
}

async function sendMessage(){

const input=document.getElementById("messageInput");
const message=input.value.trim();

if(message==="") return;

addMessage(message,"user");
input.value="";

showTyping();

const res=await fetch("http://localhost:5000/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
});

const data=await res.json();

removeTyping();
addMessage(data.reply,"bot");

}

function addMessage(text,type){

const message=document.createElement("div");
message.classList.add("message",type);

const bubble=document.createElement("div");
bubble.classList.add("bubble");
bubble.innerText=text;

message.appendChild(bubble);

if(type==="bot"){

const copy=document.createElement("div");
copy.classList.add("copy-btn");
copy.innerText="Copy";

copy.onclick=()=>{
navigator.clipboard.writeText(text);
copy.innerText="Copied!";
setTimeout(()=>copy.innerText="Copy",1000);
};

bubble.appendChild(copy);

}

chatBox.appendChild(message);
chatBox.scrollTop=chatBox.scrollHeight;

}

function showTyping(){

const typing=document.createElement("div");
typing.classList.add("message","bot");
typing.id="typing";

typing.innerHTML=`
<div class="bubble">
<div class="typing">
<span></span>
<span></span>
<span></span>
</div>
</div>
`;

chatBox.appendChild(typing);
chatBox.scrollTop=chatBox.scrollHeight;

}

function removeTyping(){
const typing=document.getElementById("typing");
if(typing) typing.remove();
}

</script>

</body>

</html>
